<!-- frontend-web/index.html (CORRIGIDO) -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linka - Rede Social Descentralizada</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
        }

        /* ===== LOGIN/REGISTER ===== */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
        }

        .auth-box {
            background: #1a1f3a;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            border: 1px solid #2a3f5f;
        }

        .auth-box h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-box p {
            color: #a0a0a0;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #c0c0c0;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: #0a0e27;
            border: 1px solid #2a3f5f;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .toggle-auth {
            text-align: center;
            margin-top: 20px;
            color: #a0a0a0;
            font-size: 14px;
        }

        .toggle-auth a {
            color: #667eea;
            cursor: pointer;
            text-decoration: none;
        }

        /* ===== MAIN APP ===== */
        .app-container {
            display: none;
            min-height: 100vh;
            background: #0a0e27;
        }

        .app-container.active {
            display: flex;
        }

        .sidebar {
            width: 300px;
            background: #1a1f3a;
            border-right: 1px solid #2a3f5f;
            padding: 20px;
            height: 100vh;
            overflow-y: auto;
            position: fixed;
            left: 0;
            top: 0;
        }

        .sidebar-logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .sidebar-user {
            background: #0a0e27;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid #2a3f5f;
        }

        .sidebar-user .username {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .sidebar-user .status {
            font-size: 12px;
            color: #a0a0a0;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 10px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #a0a0a0;
            text-decoration: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            border: none;
            width: 100%;
            font-size: 14px;
            font-weight: 500;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }

        .nav-link.active {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            border-left: 3px solid #667eea;
            padding-left: 12px;
        }

        .logout-btn {
            width: 100%;
            margin-top: auto;
            padding: 12px 15px;
            background: transparent;
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 107, 107, 0.1);
        }

        .main-content {
            margin-left: 300px;
            flex: 1;
            overflow-y: auto;
            height: 100vh;
        }

        .content-section {
            display: none;
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        .content-section.active {
            display: block;
        }

        .section-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        /* ===== FEED ===== */
        .post-card {
            background: #1a1f3a;
            border: 1px solid #2a3f5f;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .post-card:hover {
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.1);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .post-author {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        .post-info h3 {
            font-size: 16px;
            margin-bottom: 3px;
        }

        .post-info .time {
            font-size: 12px;
            color: #a0a0a0;
        }

        .post-content {
            margin-bottom: 15px;
            font-size: 15px;
            line-height: 1.6;
            color: #d0d0d0;
        }

        .post-actions {
            display: flex;
            gap: 15px;
            padding-top: 15px;
            border-top: 1px solid #2a3f5f;
        }

        .post-action-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            color: #a0a0a0;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .post-action-btn:hover {
            color: #667eea;
        }

        .post-action-btn.liked {
            color: #ff6b6b;
        }

        .comments-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #2a3f5f;
        }

        .comment-item {
            background: #0a0e27;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .comment-author {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
        }

        .comment-text {
            color: #d0d0d0;
            margin-bottom: 5px;
        }

        .comment-time {
            font-size: 12px;
            color: #a0a0a0;
        }

        .add-comment {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .add-comment input {
            flex: 1;
            padding: 10px 12px;
            background: #0a0e27;
            border: 1px solid #2a3f5f;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 13px;
        }

        .add-comment button {
            padding: 10px 15px;
            background: #667eea;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
        }

        /* ===== NEW POST ===== */
        .new-post-box {
            background: #1a1f3a;
            border: 1px solid #2a3f5f;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .new-post-header {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .new-post-textarea {
            flex: 1;
            background: #0a0e27;
            border: 1px solid #2a3f5f;
            border-radius: 8px;
            padding: 15px;
            color: #e0e0e0;
            font-size: 15px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
        }

        .new-post-textarea::placeholder {
            color: #a0a0a0;
        }

        .new-post-textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .new-post-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding-top: 15px;
            border-top: 1px solid #2a3f5f;
        }

        .btn-secondary {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid #2a3f5f;
            border-radius: 8px;
            color: #a0a0a0;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            border-color: #667eea;
            color: #667eea;
        }

        /* ===== CHAT ===== */
        .chat-container {
            display: flex;
            gap: 20px;
            height: calc(100vh - 120px);
        }

        .chat-list {
            width: 300px;
            background: #1a1f3a;
            border: 1px solid #2a3f5f;
            border-radius: 12px;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            padding: 12px;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: all 0.3s;
            background: transparent;
            border: none;
            width: 100%;
            text-align: left;
            color: #a0a0a0;
        }

        .chat-item:hover, .chat-item.active {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }

        .chat-window {
            flex: 1;
            background: #1a1f3a;
            border: 1px solid #2a3f5f;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #2a3f5f;
            font-weight: 600;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 70%;
        }

        .message.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-content {
            padding: 12px 15px;
            border-radius: 12px;
            max-width: 100%;
            word-wrap: break-word;
        }

        .message.received .message-content {
            background: #2a3f5f;
            color: #e0e0e0;
        }

        .message.sent .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .chat-input {
            padding: 20px;
            border-top: 1px solid #2a3f5f;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 15px;
            background: #0a0e27;
            border: 1px solid #2a3f5f;
            border-radius: 8px;
            color: #e0e0e0;
        }

        .chat-input button {
            padding: 12px 25px;
            background: #667eea;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }

        /* ===== PROFILE ===== */
        .profile-card {
            background: #1a1f3a;
            border: 1px solid #2a3f5f;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
        }

        .profile-name {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .profile-bio {
            color: #a0a0a0;
            margin-bottom: 20px;
            font-size: 15px;
        }

        .profile-bio input {
            width: 100%;
            padding: 10px;
            background: #0a0e27;
            border: 1px solid #2a3f5f;
            border-radius: 6px;
            color: #e0e0e0;
            margin-top: 10px;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #a0a0a0;
            margin-top: 5px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar {
                width: 0;
                transform: translateX(-100%);
                transition: transform 0.3s;
                z-index: 1000;
            }

            .sidebar.mobile-open {
                width: 100%;
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
            }

            .content-section {
                padding: 20px;
            }

            .chat-container {
                flex-direction: column;
            }

            .chat-list {
                width: 100%;
                height: 200px;
            }

            .post-card {
                padding: 15px;
            }

            .message {
                max-width: 90%;
            }
        }

        /* ===== ALERTS ===== */
        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            max-width: 400px;
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid #4caf50;
            color: #4caf50;
        }

        .alert-error {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
        }

        .close-alert {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 20px;
        }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 40px;
            color: #a0a0a0;
        }

        .spinner {
            border: 3px solid #2a3f5f;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- ===== LOGIN/REGISTER ===== -->
    <div class="auth-container" id="authContainer">
        <div class="auth-box">
            <h1>Linka</h1>
            <p>Rede social descentralizada</p>

            <!-- LOGIN -->
            <div id="loginForm">
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="loginUsername" placeholder="Seu usuário">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="loginPassword" placeholder="Sua senha">
                </div>
                <button class="btn" onclick="handleLogin()">Entrar</button>
                <div class="toggle-auth">
                    Não tem conta? <a onclick="toggleForm()">Criar conta</a>
                </div>
            </div>

            <!-- REGISTER -->
            <div id="registerForm" style="display: none;">
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="registerUsername" placeholder="Escolha um usuário">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="registerPassword" placeholder="Sua senha">
                </div>
                <button class="btn" onclick="handleRegister()">Criar Conta</button>
                <div class="toggle-auth">
                    Já tem conta? <a onclick="toggleForm()">Entrar</a>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== MAIN APP ===== -->
    <div class="app-container" id="appContainer">
        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-logo">Linka</div>
            
            <div class="sidebar-user">
                <div class="username" id="sidebarUsername"></div>
                <div class="status">Online</div>
            </div>

            <ul class="nav-menu">
                <li class="nav-item">
                    <button class="nav-link active" onclick="switchSection('feed')">
                        📰 Feed
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" onclick="switchSection('chat')">
                        💬 Chat
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" onclick="switchSection('friends')">
                        👥 Amigos
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" onclick="switchSection('profile')">
                        👤 Perfil
                    </button>
                </li>
            </ul>

            <button class="logout-btn" onclick="handleLogout()">Sair</button>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- FEED SECTION -->
            <div class="content-section active" id="feedSection">
                <div class="section-title">Feed</div>

                <!-- NEW POST -->
                <div class="new-post-box">
                    <div class="new-post-header">
                        <div class="post-avatar" id="userAvatarNew"></div>
                        <textarea class="new-post-textarea" id="newPostText" placeholder="O que você está pensando?"></textarea>
                    </div>
                    <div class="new-post-footer">
                        <button class="btn-secondary" onclick="clearNewPost()">Cancelar</button>
                        <button class="btn" onclick="handleNewPost()">Publicar</button>
                    </div>
                </div>

                <!-- POSTS -->
                <div id="feedContainer">
                    <div class="loading">
                        <div class="spinner"></div>
                        Carregando posts...
                    </div>
                </div>
            </div>

            <!-- CHAT SECTION -->
            <div class="content-section" id="chatSection">
                <div class="section-title">Chat</div>

                <div class="chat-container">
                    <div class="chat-list" id="chatList">
                        <div style="padding: 20px; text-align: center; color: #a0a0a0;">
                            Nenhuma conversa
                        </div>
                    </div>

                    <div class="chat-window" id="chatWindow" style="display: none;">
                        <div class="chat-header" id="chatHeader">Selecione uma conversa</div>
                        <div class="chat-messages" id="chatMessages"></div>
                        <div class="chat-input">
                            <input type="text" id="messageInput" placeholder="Digite uma mensagem...">
                            <button onclick="handleSendMessage()">Enviar</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- FRIENDS SECTION -->
            <div class="content-section" id="friendsSection">
                <div class="section-title">Amigos</div>

                <div class="new-post-box">
                    <div class="form-group">
                        <label>Nome de usuário</label>
                        <input type="text" id="friendUsername" placeholder="Digite o usuário">
                    </div>
                    <button class="btn" onclick="handleAddFriend()">Adicionar Amigo</button>
                </div>

                <div id="friendsContainer">
                    <p style="color: #a0a0a0;">Carregando amigos...</p>
                </div>
            </div>

            <!-- PROFILE SECTION -->
            <div class="content-section" id="profileSection">
                <div class="section-title">Meu Perfil</div>

                <div class="profile-card">
                    <div class="profile-header">
                        <div class="profile-avatar" id="profileAvatar"></div>
                        <div class="profile-name" id="profileUsername"></div>
                        <div class="profile-bio" id="profileBioDisplay"></div>
                    </div>

                    <div class="profile-stats">
                        <div class="stat">
                            <div class="stat-value" id="postsCount">0</div>
                            <div class="stat-label">Posts</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="followersCount">0</div>
                            <div class="stat-label">Seguidores</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="followingCount">0</div>
                            <div class="stat-label">Seguindo</div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Bio</label>
                        <input type="text" id="profileBioInput" placeholder="Sua bio">
                        <button class="btn" style="margin-top: 10px;" onclick="handleUpdateBio()">Salvar Bio</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIG =====
        const API_URL = 'http://localhost:5000';
        let currentUser = null;
        let currentChatUser = null;

        // ===== AUTH =====
        function toggleForm() {
            document.getElementById('loginForm').style.display = 
                document.getElementById('loginForm').style.display === 'none' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = 
                document.getElementById('registerForm').style.display === 'none' ? 'block' : 'none';
        }

        async function handleLogin() {
            const username = document.getElementById('loginUsername').value;
            const senha = document.getElementById('loginPassword').value; // ✅ MUDOU

            if (!username || !senha) {
                showAlert('Por favor, preencha todos os campos', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, senha }) // ✅ MUDOU
                });

                const data = await response.json();
                
                if (response.ok) {
                    currentUser = username;
                    localStorage.setItem('currentUser', username);
                    showApp();
                    loadFeed();
                    showAlert('Login realizado com sucesso!', 'success');
                } else {
                    showAlert(data.status || 'Erro ao fazer login', 'error');
                }
            } catch (error) {
                showAlert('Erro ao conectar com o servidor', 'error');
                console.error(error);
            }
        }

        async function handleRegister() {
            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const senha = document.getElementById('registerPassword').value; // ✅ MUDOU

            if (!username || !email || !senha) {
                showAlert('Por favor, preencha todos os campos', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, senha }) // ✅ MUDOU
                });

                const data = await response.json();
                
                if (response.ok) {
                    showAlert('Conta criada com sucesso! Faça login', 'success');
                    toggleForm();
                    document.getElementById('registerUsername').value = '';
                    document.getElementById('registerEmail').value = '';
                    document.getElementById('registerPassword').value = '';
                } else {
                    showAlert(data.status || 'Erro ao criar conta', 'error');
                }
            } catch (error) {
                showAlert('Erro ao conectar com o servidor', 'error');
                console.error(error);
            }
        }

        function handleLogout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            document.getElementById('authContainer').style.display = 'flex';
            document.getElementById('appContainer').classList.remove('active');
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }

        // ===== APP NAVIGATION =====
        function showApp() {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('appContainer').classList.add('active');
            document.getElementById('sidebarUsername').textContent = `@${currentUser}`;
            document.getElementById('userAvatarNew').textContent = currentUser[0].toUpperCase();
            document.getElementById('profileUsername').textContent = `@${currentUser}`;
            document.getElementById('profileAvatar').textContent = currentUser[0].toUpperCase();
        }

        function switchSection(section) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(section + 'Section').classList.add('active');

            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            event.target.closest('.nav-link').classList.add('active');

            if (section === 'feed') loadFeed();
            if (section === 'chat') loadChatList();
            if (section === 'profile') loadProfile();
        }

        // ===== FEED =====
        async function loadFeed() {
            try {
                const response = await fetch(`${API_URL}/feed`);
                if (response.ok) {
                    const posts = await response.json();
                    displayPosts(posts);
                }
            } catch (error) {
                document.getElementById('feedContainer').innerHTML = 
                    '<p style="color: #ff6b6b;">Erro ao carregar posts</p>';
            }
        }

        function displayPosts(posts) {
            const container = document.getElementById('feedContainer');
            container.innerHTML = '';

            if (!posts || posts.length === 0) {
                container.innerHTML = '<p style="color: #a0a0a0; text-align: center;">Nenhum post ainda. Seja o primeiro!</p>';
                return;
            }

            posts.forEach(post => {
                const postEl = document.createElement('div');
                postEl.className = 'post-card';
                postEl.innerHTML = `
                    <div class="post-header">
                        <div class="post-author">
                            <div class="post-avatar">${post.username[0].toUpperCase()}</div>
                            <div class="post-info">
                                <h3>@${post.username}</h3>
                                <span class="time">${post.datetime}</span>
                            </div>
                        </div>
                    </div>
                    <div class="post-content">${post.text_post}</div>
                    <div class="post-actions">
                        <button class="post-action-btn" onclick="handleLikePost(${post.id}, this)">
                            ⭐ <span>${post.star || 0}</span>
                        </button>
                    </div>
                    <div class="comments-section" id="comments-${post.id}">
                        <div class="add-comment">
                            <input type="text" placeholder="Adicionar comentário..." id="comment-input-${post.id}">
                            <button onclick="handleAddComment(${post.id})">Enviar</button>
                        </div>
                    </div>
                `;
                container.appendChild(postEl);
                loadComments(post.id);
            });
        }

        async function loadComments(postId) {
            try {
                const response = await fetch(`${API_URL}/comment/view/${postId}`);
                if (response.ok) {
                    const comments = await response.json();
                    const commentsSection = document.getElementById(`comments-${postId}`);
                    
                    comments.forEach(comment => {
                        const commentEl = document.createElement('div');
                        commentEl.className = 'comment-item';
                        commentEl.innerHTML = `
                            <div class="comment-author">@${comment.username}</div>
                            <div class="comment-text">${comment.text_comment}</div>
                            <div class="comment-time">${comment.datetime}</div>
                        `;
                        commentsSection.insertBefore(commentEl, commentsSection.firstChild);
                    });
                }
            } catch (error) {
                console.log('Erro ao carregar comentários');
            }
        }

        async function handleAddComment(postId) {
            const input = document.getElementById(`comment-input-${postId}`);
            const text = input.value.trim();

            if (!text) return;

            try {
                const now = new Date();
                const datetime = now.toLocaleDateString('pt-BR') + ' ' + now.toLocaleTimeString('pt-BR');

                const response = await fetch(`${API_URL}/comment/new`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        post_id: postId,
                        username: currentUser,
                        text_comment: text,
                        datetime: datetime
                    })
                });

                if (response.ok) {
                    input.value = '';
                    loadFeed();
                }
            } catch (error) {
                showAlert('Erro ao adicionar comentário', 'error');
            }
        }

        async function handleNewPost() {
            const text = document.getElementById('newPostText').value.trim();

            if (!text) {
                showAlert('Digite algo antes de publicar', 'error');
                return;
            }

            try {
                const now = new Date();
                const datetime = now.toLocaleDateString('pt-BR') + ' ' + now.toLocaleTimeString('pt-BR');

                const response = await fetch(`${API_URL}/new`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: currentUser,
                        text_post: text,
                        datetime: datetime
                    })
                });

                if (response.ok) {
                    document.getElementById('newPostText').value = '';
                    showAlert('Post publicado!', 'success');
                    loadFeed();
                }
            } catch (error) {
                showAlert('Erro ao publicar post', 'error');
            }
        }

        function clearNewPost() {
            document.getElementById('newPostText').value = '';
        }

        async function handleLikePost(postId, button) {
            try {
                const response = await fetch(`${API_URL}/star`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        post_id: postId,
                        'add-or-remove': button.classList.contains('liked') ? 'remove' : 'add'
                    })
                });

                if (response.ok) {
                    button.classList.toggle('liked');
                }
            } catch (error) {
                console.log('Erro ao atualizar like');
            }
        }

        // ===== CHAT =====
        async function loadChatList() {
            // Aqui você pode carregar lista de conversas
            // Por enquanto, mostramos um placeholder
        }

        async function handleSendMessage() {
            const text = document.getElementById('messageInput').value.trim();

            if (!text || !currentChatUser) return;

            try {
                const response = await fetch(`${API_URL}/send-message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        receiver: currentChatUser,
                        remittee: currentUser,
                        message: text
                    })
                });

                if (response.ok) {
                    document.getElementById('messageInput').value = '';
                    const messageEl = document.createElement('div');
                    messageEl.className = 'message sent';
                    messageEl.innerHTML = `
                        <div class="message-content">${text}</div>
                    `;
                    document.getElementById('chatMessages').appendChild(messageEl);
                }
            } catch (error) {
                showAlert('Erro ao enviar mensagem', 'error');
            }
        }

        // ===== PROFILE =====
        async function loadProfile() {
            try {
                const response = await fetch(`${API_URL}/view_profile/${currentUser}`);
                if (response.ok) {
                    const profile = await response.json();
                    if (profile.length > 0) {
                        document.getElementById('profileBioInput').value = profile[0][1] || '';
                        document.getElementById('profileBioDisplay').textContent = profile[0][1] || 'Sem bio';
                    }
                }

                // Contar posts
                const feedResponse = await fetch(`${API_URL}/feed`);
                if (feedResponse.ok) {
                    const posts = await feedResponse.json();
                    const userPosts = posts.filter(p => p.username === currentUser).length;
                    document.getElementById('postsCount').textContent = userPosts;
                }
            } catch (error) {
                console.log('Erro ao carregar perfil');
            }
        }

        async function handleUpdateBio() {
            const bio = document.getElementById('profileBioInput').value;

            try {
                const response = await fetch(`${API_URL}/edit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        'edit-mode': 'bio',
                        content: bio,
                        username: currentUser
                    })
                });

                if (response.ok) {
                    document.getElementById('profileBioDisplay').textContent = bio || 'Sem bio';
                    showAlert('Bio atualizada!', 'success');
                }
            } catch (error) {
                showAlert('Erro ao atualizar bio', 'error');
            }
        }

        async function handleAddFriend() {
            const username = document.getElementById('friendUsername').value.trim();

            if (!username) {
                showAlert('Digite um nome de usuário', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/send-friend`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        receiver: username,
                        remittee: currentUser
                    })
                });

                if (response.ok) {
                    showAlert('Solicitação enviada!', 'success');
                    document.getElementById('friendUsername').value = '';
                }
            } catch (error) {
                showAlert('Erro ao adicionar amigo', 'error');
            }
        }

        // ===== UTILS =====
        function showAlert(message, type) {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `
                <span>${message}</span>
                <button class="close-alert" onclick="this.parentElement.remove()">×</button>
            `;
            document.body.insertBefore(alert, document.body.firstChild);
            setTimeout(() => alert.remove(), 4000);
        }

        // ===== INIT =====
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('currentUser');
            if (saved) {
                currentUser = saved;
                showApp();
                loadFeed();
            }
        });
    </script>
