<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="doc-style.css">
    
    <title>Login</title>
</head>

<body>

    <div id="main" class="main-page">
        <button onclick="irPara('login')">login</button>
        <button onclick="irPara('register')">register</button>
    </div>

    <div id="login" class="tela">
        <h2>Login</h2>
        <input id = "user" type="text" placeholder="username">
        <input id = "pass" type="password" placeholder="password">
        <button onclick="login_request()">Entrar</button>
    </div>

    <div id="register" class="tela">
        <h2>register</h2>
        <input id="reg-user" type="text" placeholder="username">
        <input id="reg-pass"type="password" placeholder="password">
        <input type="password" placeholder="repeat the password">
        <input id="reg-email" type="email" placeholder="e-mail">
        <button onclick="register_request()">Create Account</button>
    </div>

    <script>
    function irPara(tela) {
        document.getElementById("main").style.display = "none";

        document.querySelectorAll(".tela").forEach(el => {
            el.style.display = "none";
        });

        document.getElementById(tela).style.display = "block";
    }
    </script>

    <style>
    .tela {
        display: none;
    }
    </style>
    <style>
    #login {
        display: none;
    }
    #register {
        display: none;
    }
    </style>
<script src="login.js"></script>
</body>
</html>
