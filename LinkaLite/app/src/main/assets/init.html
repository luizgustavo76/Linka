<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Boot</title>
</head>
<body>
<h3>Loading...</h3>
<h2><a href="index.html">Stuck here? go to login!</a></h2>
<script>
setTimeout(function(){
    try {
        Linka.ensureFile("config-login.cfg");

        var cfg = JSON.parse(Linka.loadCfgAsJson("config-login.cfg"));

        var username = null;
        var token_session = null;

        if (cfg["FAST-LOGIN"]) {
            username = cfg["FAST-LOGIN"]["username"];
            token_session = cfg["FAST-LOGIN"]["token_session"];
        }

        if (!username || !token_session){
            window.location.href = "file:///android_asset/login.html";
        } else {
            window.location.href = "file:///android_asset/index.html";
        }

    } catch(e) {
        window.location.href = "file:///android_asset/login.html";
    }
}, 300);

try {

    var raw = Linka.loadCfgAsJson("config-login.cfg");

    document.body.innerHTML = raw;

    var cfg = JSON.parse(raw);

} catch(e) {

    document.body.innerHTML = e.toString();

}
</script>

</body>
</html>
